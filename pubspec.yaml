name: comfortos
description: "ComfortOS — Smart Building Comfort Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Local encrypted storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UUID generation for vote idempotency
  uuid: ^4.5.1

  # HTTP client for weather API
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
